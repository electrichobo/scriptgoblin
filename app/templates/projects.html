{% extends "base.html" %}

{% block title %}Projects - Script Goblin{% endblock %}

{% block content %}
<h1>Projects</h1>

{% if projects %}
  <ul>
    {% for project in projects %}
      <li>
        <a href="/projects/{{ project.slug }}">{{ project.slug }}</a>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p>No projects found.</p>
{% endif %}
{% endblock %}
